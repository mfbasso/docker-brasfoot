name: Build And Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  prepare_version:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Generate date-based version
        id: version
        run: echo "value=$(date -u +'%Y%m%d.%H.%M')" >> "$GITHUB_OUTPUT"

  build_appimage:
    name: Build AppImage Artifact
    runs-on: ubuntu-latest
    needs: prepare_version

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build AppImage via bootstrap
        run: |
          chmod +x scripts/bootstrap.sh
          bash scripts/bootstrap.sh
          ls -lah root/root/bin || true
          test -f root/root/bin/brasfoot.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: brasfoot-appimage-${{ needs.prepare_version.outputs.version }}
          path: root/root/bin/brasfoot.AppImage
          if-no-files-found: error
          retention-days: 14

  publish_release:
    name: Publish Release Asset
    runs-on: ubuntu-latest
    needs:
      - prepare_version
      - build_appimage

    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: brasfoot-appimage-${{ needs.prepare_version.outputs.version }}
          path: dist

      - name: Publish AppImage to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ needs.prepare_version.outputs.version }}
          generate_release_notes: true
          files: dist/brasfoot.AppImage
          fail_on_unmatched_files: true

  build_and_push_docker:
    name: Build And Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - prepare_version
      - build_appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: brasfoot-appimage-${{ needs.prepare_version.outputs.version }}
          path: root/root/bin

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.prepare_version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
