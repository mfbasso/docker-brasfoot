name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build_appimage:
    name: Build AppImage Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build AppImage via bootstrap
        run: |
          chmod +x scripts/bootstrap.sh
          sh scripts/bootstrap.sh
          test -f root/root/bin/brasfoot.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: brasfoot-appimage
          path: root/root/bin/brasfoot.AppImage
          if-no-files-found: error
          retention-days: 14

  publish_release:
    name: Publish Release Asset
    runs-on: ubuntu-latest
    needs: build_appimage
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: brasfoot-appimage
          path: dist

      - name: Publish AppImage to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/brasfoot.AppImage
          fail_on_unmatched_files: true

  build_and_push_docker:
    name: Build And Push Docker Image
    runs-on: ubuntu-latest
    needs: build_appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: brasfoot-appimage
          path: root/root/bin

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
